spring.application.name=flipkart_backend
spring.datasource.url=jdbc:mysql://localhost:3306/flipkart_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Secret (Change this in production)
jwt.secret=MySuperSecretKeyForFlipkartCloneProject123456789
jwt.expiration=86400000

# Server Port
server.port=8080

# Add Stripe Configuration
stripe.api.key=${STRIPE_SECRET_KEY:sk_test_your_stripe_secret_key}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_your_webhook_secret}
stripe.success.url=http://localhost:3000/payment-success?sessionId={CHECKOUT_SESSION_ID}
stripe.cancel.url=http://localhost:3000/payment-failure