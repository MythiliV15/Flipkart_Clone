name: Monorepo CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          
      - name: Build and Test Backend
        run: |
          cd flipkart_backend
          mvn clean package -DskipTests

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: flipkart-frontend/package-lock.json
          
      - name: Build Frontend
        run: |
          cd flipkart-frontend
          npm install
          npm run build

  # Deployment is typically handled via Render and Vercel's automatic Git integration.
  # If you want to trigger them manually via GitHub Actions, you would use:
  # - Render: curl -X POST https://api.render.com/deploy/srv-xxx?key=yyy
  # - Vercel: amondnet/vercel-action
